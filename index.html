<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITROGEN GYM</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Oswald',sans-serif;
    background:#000;
    color:#ff0000;
}

/* EVERYTHING ELSE SAME */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-size:36px;
    font-weight:700;
}

.join-btn{
    background:transparent;
    border:2px solid #ff0000;
    color:#ff0000;
    padding:10px 25px;
    border-radius:30px;
    cursor:pointer;
}

.hero{
    width:100%;
    max-height:500px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:500px;
    object-fit:cover;
}

.equipment-section{
    width:95%;
    max-width:1400px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:40px;
}

.equipment-card{
    background:#111;
    border:1px solid #ff0000;
    border-radius:25px;
    padding:25px;
    text-align:center;
    cursor:pointer;
}

.equipment-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
}

.equipment-card p{
    margin-top:15px;
    font-size:22px;
    font-weight:600;
}

/* -------- NEW DRAWN STYLE INTERFACE -------- */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    overflow:auto;
}

.modal-box{
    width:90%;
    max-width:900px;
    background:#111;
    border:2px solid #ff0000;
    border-radius:25px;
    padding:40px;
    margin:40px 0;
    position:relative;
}

.close{
    position:absolute;
    top:15px;
    right:20px;
    font-size:22px;
    cursor:pointer;
}

/* Exercise Blocks */
.exercise-block{
    margin:30px 0;
    padding:20px;
    border:1px solid #ff0000;
    border-radius:15px;
}

.exercise-title{
    font-size:24px;
    margin-bottom:15px;
}

/* Placeholder Image Area */
.image-space{
    width:100%;
    height:180px;
    border:1px dashed #ff0000;
    border-radius:10px;
    margin-top:10px;
}

@media(max-width:1000px){
    .equipment-section{
        grid-template-columns:repeat(2,1fr);
    }
}

</style>
</head>
<body>

<header>
<div class="logo">NITROGEN GYM</div>
<button class="join-btn">JOIN</button>
</header>

<div class="hero">
<img src="header.jpg">
</div>

<div class="equipment-section">

<div class="equipment-card" onclick="openModal('Dumbbells')">
<img src="dumbbell.jpg">
<p>Dumbbells</p>
</div>

<div class="equipment-card" onclick="openModal('Cable Machine')">
<img src="cable.jpg">
<p>Cable Machine</p>
</div>

<div class="equipment-card" onclick="openModal('Treadmill')">
<img src="treadmill.jpg">
<p>Treadmill</p>
</div>

<!-- Keep your other equipment same -->

</div>

<!-- DRAWN STYLE MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">X</span>
<h2 id="equipmentTitle"></h2>
<div id="exerciseContainer"></div>
</div>
</div>

<script>

/* Exercise Mapping */
const exercises = {
"Dumbbells": ["Bicep Curl","Shoulder Press","Dumbbell Fly"],
"Cable Machine": ["Cable Fly","Tricep Pushdown","Cable Row"],
"Treadmill": ["Sprint Intervals","Incline Walk","Fat Burn Run"]
};

function openModal(machine){
document.getElementById("modal").style.display="flex";
document.getElementById("equipmentTitle").innerText=machine;

let container = document.getElementById("exerciseContainer");
container.innerHTML = "";

exercises[machine].forEach(ex => {
container.innerHTML += `
<div class="exercise-block">
<div class="exercise-title">• ${ex}</div>
<div class="image-space"></div>
</div>
`;
});
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
